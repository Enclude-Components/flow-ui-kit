<template>
    <div class="calendar-container slds-p-around_x-small">
        <div lwc:if={daySelected}>
            <lightning-button label="Back" title="Back" icon-name="utility:back" onclick={clearSelectedDay}></lightning-button>
            <div class="slds-text-heading_medium slds-m-vertical_small">{daySelectedDate}</div>
            <hr class="slds-m-vertical_none"/>
            <div class="slds-text-heading_small slds-m-vertical_small">Select a Time</div>
            <c-flow-calendar-day-selected-record-button
                for:each={daySelectedRecords}
                for:item="record"
                key={record.Id}
                record={record}
                date-time-field={dateTimeField}
                onrecordselected={handleRecordSelected}
            ></c-flow-calendar-day-selected-record-button>
        </div>
        <c-flow-calendar
            lwc:else
            input-records={inputRecords}
            date-time-field={dateTimeField}
            ondayselected={handleDaySelected}
        ></c-flow-calendar>
    </div>
</template>
